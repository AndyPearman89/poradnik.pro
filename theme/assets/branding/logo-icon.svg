<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Poradnik.pro icon">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#icon-grad)" filter="url(#glow)"/>
  <text x="24" y="32" font-family="Inter,Poppins,sans-serif" font-size="24" font-weight="700"
        text-anchor="middle" fill="#fff">P</text>
  <circle cx="36" cy="10" r="6" fill="#ec4899"/>
  <text x="36" y="14" font-family="Inter,Poppins,sans-serif" font-size="9" font-weight="700"
        text-anchor="middle" fill="#fff">?</text>
</svg>
