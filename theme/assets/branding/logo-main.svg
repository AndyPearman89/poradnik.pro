<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="Poradnik.pro">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: P + ? mark -->
  <rect x="2" y="4" width="40" height="40" rx="10" fill="url(#brand-grad)" filter="url(#glow)"/>
  <text x="21" y="31" font-family="Inter,Poppins,sans-serif" font-size="22" font-weight="700"
        text-anchor="middle" fill="#fff">P</text>
  <circle cx="33" cy="12" r="5" fill="#ec4899"/>
  <text x="33" y="16" font-family="Inter,Poppins,sans-serif" font-size="8" font-weight="700"
        text-anchor="middle" fill="#fff">?</text>
  <!-- Wordmark -->
  <text x="52" y="30" font-family="Inter,Poppins,sans-serif" font-size="18" font-weight="700"
        fill="url(#brand-grad)">Poradnik</text>
  <text x="148" y="30" font-family="Inter,Poppins,sans-serif" font-size="18" font-weight="400"
        fill="#9ca3af">.pro</text>
</svg>
